description: SBS linking stage eval template
providers:
  - openai:gpt-4o-mini
prompts:
  - |
    You are testing linking prompt behavior.
    Prompt bundle path: {{env.SBS_PROMPT_BUNDLE}}
    Input: {{input}}
tests:
  - vars:
      input: "Find meaningful links between these notes."
    assert:
      - type: contains
        value: "link"
