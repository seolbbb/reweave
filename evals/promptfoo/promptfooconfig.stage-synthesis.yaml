description: SBS synthesis stage eval template
providers:
  - openai:gpt-4o-mini
prompts:
  - |
    You are testing synthesis prompt behavior.
    Prompt bundle path: {{env.SBS_PROMPT_BUNDLE}}
    Input: {{input}}
tests:
  - vars:
      input: "Create one atomic note and classify as fleeting or permanent."
    assert:
      - type: contains
        value: "note"
