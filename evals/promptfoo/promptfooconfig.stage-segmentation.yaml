description: SBS segmentation stage eval template
providers:
  - openai:gpt-4o-mini
prompts:
  - |
    You are testing segmentation prompt behavior.
    Prompt bundle path: {{env.SBS_PROMPT_BUNDLE}}
    Stage: {{env.SBS_EVAL_STAGE}}
    Input: {{input}}
tests:
  - vars:
      input: "Segment this conversation into coherent topics."
    assert:
      - type: contains
        value: "segment"
