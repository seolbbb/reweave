description: SBS extraction stage eval template
providers:
  - openai:gpt-4o-mini
prompts:
  - |
    You are testing extraction prompt behavior.
    Prompt bundle path: {{env.SBS_PROMPT_BUNDLE}}
    Input: {{input}}
tests:
  - vars:
      input: "Extract concepts, decisions, and insights from this segment."
    assert:
      - type: contains
        value: "concept"
